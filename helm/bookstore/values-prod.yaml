# Production overrides
replicaCount: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  ENVIRONMENT: production
  DEBUG: "false"

ingress:
  enabled: true
  host: bookstore.example.com
  tls:
    - secretName: bookstore-tls
      hosts:
        - bookstore.example.com
